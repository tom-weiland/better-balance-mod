pluginManagement {
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		mavenCentral()
		gradlePluginPortal()
	}
}

// Lets Gradle auto-download the required JDK (Minecraft 26.2 needs Java 25) so the build is reproducible regardless of the local JDK
plugins {
	id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}